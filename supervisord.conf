[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0

[program:fastapi]
command=/bin/sh -c 'uvicorn main:app --host 0.0.0.0 --port 8003 --workers ${AMUL_VOICE_UVICORN_WORKERS:-8}'
directory=/app
environment=PYTHONPATH=/app
autostart=true
autorestart=true
startsecs=5
startretries=3
stopsignal=TERM
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
